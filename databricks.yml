bundle:
  name: DABDemo

include:
  - src/*.yml
  - src/env/*.yml
  - resources/jobs/*.yml
  - resources/pipelines/*.yml
  - resources/schemas/*.yml

permissions:
  - group_name: users
    level: CAN_MANAGE

targets:
  dev:
    mode: development
    default: true
    workspace:
      host: https://dbc-848e3cf5-77a3.cloud.databricks.com/

  qa:
    default: false
    workspace:
      host: https://dbc-848e3cf5-77a3.cloud.databricks.com/